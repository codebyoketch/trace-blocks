<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      margin: 0;
    }

    .card {
      background: #fff;
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 1.4rem;
    }

    form p label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #444;
    }

    form p input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
      box-sizing: border-box;
    }

    form p input:focus {
      outline: none;
      border-color: #4a90e2;
    }

    button[type="submit"] {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: #357abd;
    }
    .custom{
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;

    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login to Add Content</h2>
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <p>
        <label for="id_username">Username:</label>
        <input type="text" name="username" id_username="id_username" required placeholder="Enter username">
      </p>
      <p>
        <label for="id_password">Password:</label>
        <input type="password" name="password" id="id_password" required placeholder="Enter password">
      </p>

      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
