services:
  - type: web
    name: trace-blocks
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd traceblocks && gunicorn traceblocks.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: trace-blocks.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: trace-blocks-db
          property: connectionString
      - key: VECHAIN_NODE_URL
        value: https://mainnet.veblocks.net
      - key: VECHAIN_NETWORK
        value: main

databases:
  - name: trace-blocks-db
    plan: free

  - key: VECHAIN_PRIVATE_KEY
    sync: false   # marks it as a secret, enter value manually in dashboard